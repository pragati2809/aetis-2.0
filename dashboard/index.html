<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AETIS — Adaptive Emergency Traffic Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    :root {
      --bg:          #f0f4f8;
      --surface:     rgba(255,255,255,0.72);
      --surface-2:   rgba(255,255,255,0.55);
      --border:      rgba(0,0,0,0.07);
      --border-2:    rgba(0,0,0,0.04);

      --blue:        #2563eb;
      --blue-soft:   rgba(37,99,235,0.1);
      --blue-glow:   rgba(37,99,235,0.25);
      --amber:       #f59e0b;
      --amber-soft:  rgba(245,158,11,0.1);
      --red:         #ef4444;
      --red-soft:    rgba(239,68,68,0.1);
      --green:       #10b981;
      --green-soft:  rgba(16,185,129,0.12);

      --text-1:      #0f172a;
      --text-2:      #475569;
      --text-3:      #94a3b8;

      --radius:      16px;
      --radius-sm:   10px;
      --shadow:      0 4px 24px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
      --shadow-lg:   0 12px 40px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.05);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-1);
    }

    /* Soft radial background blobs */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 20%, rgba(37,99,235,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 75%, rgba(16,185,129,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(245,158,11,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LAYOUT ─────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      gap: 0;
      padding: 20px;
      gap: 16px;
    }

    /* ─── SIDEBAR ─────────────────────────────────────── */
    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    /* ─── HEADER CARD ─────────────────────────────────── */
    #header-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    #header-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), #818cf8, var(--green));
      border-radius: 3px 3px 0 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--blue), #6366f1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px var(--blue-glow);
      flex-shrink: 0;
    }

    .logo-icon svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; }

    .logo-text h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-1);
    }

    .logo-text p {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.3px;
      margin-top: 1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-2);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
    }

    .status-dot.live {
      background: var(--green);
      box-shadow: 0 0 0 3px var(--green-soft);
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
      50%      { box-shadow: 0 0 0 6px rgba(16,185,129,0.05); }
    }

    #reset-btn {
      background: var(--red-soft);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--red);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    #reset-btn:hover {
      background: var(--red);
      color: white;
      border-color: var(--red);
      box-shadow: 0 4px 12px rgba(239,68,68,0.25);
    }

    /* ─── SIGNAL CARDS ────────────────────────────────── */
    #signal-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .sig-box {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .sig-box::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green-soft);
      opacity: 0;
      transition: opacity 0.4s;
      border-radius: inherit;
    }

    .sig-box.active {
      border-color: var(--green);
      box-shadow: 0 0 0 2px var(--green-soft), var(--shadow);
      transform: translateY(-2px);
    }

    .sig-box.active::after { opacity: 1; }

    .sig-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--text-3);
      text-transform: uppercase;
      margin-bottom: 10px;
      position: relative; z-index: 1;
    }

    .sig-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      margin: 0 auto;
      background: #e2e8f0;
      border: 2px solid rgba(0,0,0,0.06);
      position: relative; z-index: 1;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .sig-dot.green {
      background: var(--green);
      border-color: rgba(16,185,129,0.3);
      box-shadow: 0 0 0 5px var(--green-soft), 0 4px 12px rgba(16,185,129,0.4);
      animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop-in {
      0%   { transform: scale(0.5); }
      100% { transform: scale(1); }
    }

    .sig-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      margin-top: 7px;
      position: relative; z-index: 1;
    }

    /* ─── STATS ROW ──────────────────────────────────── */
    #stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 3px;
    }

    .stat-card.blue .stat-value { color: var(--blue); }
    .stat-card.amber .stat-value { color: var(--amber); }

    /* ─── FEED ──────────────────────────────────────── */
    #feed-wrapper {
      flex: 1;
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .feed-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .feed-title .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px var(--green-soft);
      animation: breathe 2s ease-in-out infinite;
    }

    #feed-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    #feed {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    #feed::-webkit-scrollbar { width: 3px; }
    #feed::-webkit-scrollbar-track { background: transparent; }
    #feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── ALERT CARDS ────────────────────────────────── */
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid var(--border-2);
      background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    @keyframes slideUp {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    .alert-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .alert-icon-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-emoji {
      font-size: 16px;
      line-height: 1;
    }

    .alert-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .badge.blue   { background: var(--blue-soft);  color: var(--blue); }
    .badge.amber  { background: var(--amber-soft); color: #b45309; }
    .badge.red    { background: var(--red-soft);   color: var(--red); }
    .badge.green  { background: var(--green-soft); color: #065f46; }

    .alert-meta {
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .alert-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .alert-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-3);
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ─── MAP PANEL ─────────────────────────────────── */
    #map-panel {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #map-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: rgba(255,255,255,0.8);
    }

    .map-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-title-icon {
      width: 28px; height: 28px;
      background: var(--blue-soft);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: var(--blue);
      font-size: 14px;
    }

    .map-tags {
      display: flex;
      gap: 8px;
    }

    .map-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-2);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
    }

    .map-tag-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    #map {
      flex: 1;
    }

    /* ─── LEAFLET OVERRIDE ─────────────────────────── */
    .leaflet-container {
      background: #e8edf2 !important;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      box-shadow: var(--shadow-lg) !important;
      font-family: 'DM Sans', sans-serif !important;
      border: 1px solid var(--border) !important;
    }

    .leaflet-popup-tip-container { display: none; }

    .leaflet-control-zoom {
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      overflow: hidden;
      box-shadow: var(--shadow) !important;
    }

    .leaflet-control-zoom a {
      background: white !important;
      color: var(--text-2) !important;
      font-weight: 600 !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--bg) !important;
      color: var(--blue) !important;
    }

    /* ─── EMPTY STATE ───────────────────────────────── */
    .empty-feed {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-3);
    }

    .empty-feed svg { opacity: 0.3; }
    .empty-feed p { font-size: 12px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── SIDEBAR ─────────────────────────── -->
  <div id="sidebar">

    <!-- Header -->
    <div id="header-card">
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/>
            <circle cx="12" cy="12" r="3" stroke-width="2"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>AETIS</h1>
          <p>Adaptive Emergency Traffic Intelligence</p>
        </div>
      </div>
      <div class="status-bar">
        <div id="status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Connecting…</span>
        </div>
        <button id="reset-btn" onclick="resetSignals()">↺ Reset</button>
      </div>
    </div>

    <!-- Signal Row -->
    <div id="signal-row">
      <div class="sig-box" id="box-signal_1">
        <div class="sig-label">SIG · 01</div>
        <div class="sig-dot" id="dot-signal_1"></div>
        <div class="sig-name">North</div>
      </div>
      <div class="sig-box" id="box-signal_2">
        <div class="sig-label">SIG · 02</div>
        <div class="sig-dot" id="dot-signal_2"></div>
        <div class="sig-name">Central</div>
      </div>
      <div class="sig-box" id="box-signal_3">
        <div class="sig-label">SIG · 03</div>
        <div class="sig-dot" id="dot-signal_3"></div>
        <div class="sig-name">South</div>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats-row">
      <div class="stat-card blue">
        <div class="stat-label">EV Events</div>
        <div class="stat-value" id="stat-ev">0</div>
        <div class="stat-sub">Today</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Road Issues</div>
        <div class="stat-value" id="stat-road">0</div>
        <div class="stat-sub">Active</div>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed-wrapper">
      <div class="feed-header">
        <div class="feed-title">
          <div class="dot"></div>
          Live Events
        </div>
        <div id="feed-count">0 events</div>
      </div>
      <div id="feed">
        <div class="empty-feed" id="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <p>Awaiting live events…</p>
        </div>
      </div>
    </div>

  </div>

  <!-- ── MAP PANEL ────────────────────────── -->
  <div id="map-panel">
    <div id="map-header">
      <div class="map-title">
        <div class="map-title-icon">🗺</div>
        Noida — Live Traffic View
      </div>
      <div class="map-tags">
        <div class="map-tag">
          <div class="map-tag-dot" style="background:var(--blue)"></div>
          Camera Node
        </div>
        <div class="map-tag">
          <div class="map-tag-dot" style="background:var(--red)"></div>
          HIGH severity
        </div>
        <div class="map-tag">
          <div class="map-tag-dot" style="background:var(--amber)"></div>
          MEDIUM severity
        </div>
      </div>
    </div>
    <div id="map"></div>
  </div>

</div>

<script>
const MAP_CENTER = [28.5355, 77.3910];

// ── Map — bright light tiles ─────────────────────────
const map = L.map('map', { zoomControl: false }).setView(MAP_CENTER, 15);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

// ── Camera marker ────────────────────────────────────
const camIcon = L.divIcon({
  className: '',
  iconSize: [0, 0],
  html: `
    <div style="position:relative;width:0;height:0">
      <div style="
        position:absolute;
        transform:translate(-50%,-50%);
        width:46px;height:46px;
        border:2px solid rgba(37,99,235,0.25);
        border-radius:50%;
        animation:camPing 2.5s ease-out infinite;
      "></div>
      <div style="
        position:absolute;
        transform:translate(-50%,-50%);
        width:16px;height:16px;
        background:white;
        border:3px solid #2563eb;
        border-radius:50%;
        box-shadow:0 2px 12px rgba(37,99,235,0.4);
        z-index:2
      "></div>
    </div>
    <style>
      @keyframes camPing {
        0%   { transform:translate(-50%,-50%) scale(.5); opacity:.9; }
        100% { transform:translate(-50%,-50%) scale(2.2); opacity:0; }
      }
    </style>
  `
});

L.marker(MAP_CENTER, { icon: camIcon })
  .bindPopup(`
    <div style="font-family:'DM Sans',sans-serif;padding:4px 2px">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px">📷 Camera Node 1</div>
      <div style="font-size:12px;color:#64748b">AETIS Surveillance Active</div>
      <div style="font-size:11px;color:#2563eb;margin-top:4px;font-family:'JetBrains Mono',monospace">${MAP_CENTER[0].toFixed(4)}, ${MAP_CENTER[1].toFixed(4)}</div>
    </div>
  `)
  .addTo(map);

// ── Counters ─────────────────────────────────────────
let evCount = 0, roadCount = 0, feedCount = 0;

function updateCounters() {
  document.getElementById('stat-ev').textContent   = evCount;
  document.getElementById('stat-road').textContent = roadCount;
  document.getElementById('feed-count').textContent = feedCount + ' event' + (feedCount !== 1 ? 's' : '');
}

// ── Reset signals ─────────────────────────────────────
function resetSignals() {
  fetch('/reset').then(() => {
    ['signal_1','signal_2','signal_3'].forEach(id => {
      const dot = document.getElementById('dot-' + id);
      const box = document.getElementById('box-' + id);
      if (dot) dot.className = 'sig-dot';
      if (box) box.classList.remove('active');
    });
  }).catch(() => {
    ['signal_1','signal_2','signal_3'].forEach(id => {
      const dot = document.getElementById('dot-' + id);
      const box = document.getElementById('box-' + id);
      if (dot) dot.className = 'sig-dot';
      if (box) box.classList.remove('active');
    });
  });
}

// ── Add alert to feed ─────────────────────────────────
function addAlert(emoji, name, badgeText, badgeClass, metaItems, time) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  feedCount++;
  updateCounters();

  const feed = document.getElementById('feed');
  const div  = document.createElement('div');
  div.className = 'alert';

  const metaHTML = metaItems.map(m => `<span>${m}</span>`).join('');

  div.innerHTML = `
    <div class="alert-top">
      <div class="alert-icon-name">
        <span class="alert-emoji">${emoji}</span>
        <span class="alert-name">${name}</span>
      </div>
      <span class="badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="alert-meta">
      ${metaHTML}
      <span class="alert-time">${time}</span>
    </div>
  `;
  feed.prepend(div);
  if (feed.children.length > 60) feed.removeChild(feed.lastChild);
}

// ── Update signal dot ─────────────────────────────────
function updateSignalDot(signal_id, state) {
  const dot = document.getElementById('dot-' + signal_id);
  const box = document.getElementById('box-' + signal_id);
  if (!dot) return;
  if (state === 'green') {
    dot.className = 'sig-dot green';
    box?.classList.add('active');
  } else {
    dot.className = 'sig-dot';
    box?.classList.remove('active');
  }
}

// ── WebSocket ─────────────────────────────────────────
function connect() {
  const ws = new WebSocket('ws://' + location.host + '/ws');

  ws.onopen = () => {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.className  = 'status-dot live';
    text.textContent = 'LIVE';
  };

  ws.onclose = () => {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.className  = 'status-dot';
    text.textContent = 'Reconnecting…';
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    const t   = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    if (msg.type === 'ev_detection') {
      const d = msg.data;
      evCount++;
      addAlert(
        '🚑',
        d.vehicle_type,
        'EV',
        'blue',
        [`CAM-${d.camera_id}`, `${d.direction}`, `${d.speed_kmh} km/h`, `${Math.round(d.confidence*100)}% conf`],
        t
      );
      if (d.corridor) {
        d.corridor.forEach(c => {
          setTimeout(() => updateSignalDot(c.signal_id, 'green'), c.delay_seconds * 1000);
          setTimeout(() => updateSignalDot(c.signal_id, 'red'),   (c.delay_seconds + c.duration) * 1000);
        });
      }

    } else if (msg.type === 'road_damage') {
      const d = msg.data;
      roadCount++;
      const isHigh = d.severity === 'HIGH';
      addAlert(
        '🕳️',
        d.damage_type,
        d.severity,
        isHigh ? 'red' : 'amber',
        [`CAM-${d.camera_id}`, `${Math.round(d.confidence*100)}% conf`],
        t
      );
      if (d.gps) {
        const markerIcon = L.divIcon({
          className: '',
          iconSize: [0, 0],
          html: `<div style="
            position:absolute;
            transform:translate(-50%,-50%);
            width:14px;height:14px;
            background:${isHigh ? '#ef4444' : '#f59e0b'};
            border:2.5px solid white;
            border-radius:50%;
            box-shadow:0 2px 8px ${isHigh ? 'rgba(239,68,68,0.5)' : 'rgba(245,158,11,0.5)'};
          "></div>`
        });
        L.marker(d.gps, { icon: markerIcon })
          .bindPopup(`
            <div style="font-family:'DM Sans',sans-serif;padding:4px 2px">
              <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px">${d.damage_type}</div>
              <div style="font-size:11px;margin-top:3px;color:${isHigh?'#ef4444':'#b45309'};font-weight:600">${d.severity} severity</div>
            </div>
          `)
          .addTo(map);
      }

    } else if (msg.type === 'signal_update') {
      updateSignalDot(msg.signal_id, msg.state);
    }
  };
}

connect();
</script>
